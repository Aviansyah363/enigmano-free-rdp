name: EnigMano RDP

on:
  workflow_dispatch:
    inputs:
      instance_number:
        description: 'Instance Number (1-10)'
        required: true
        default: '1'
        type: string

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: System Info
      run: |
        Write-Host "=== ENIGMANO RDP DEPLOYMENT ===" -ForegroundColor Green
        Write-Host "Instance: ${{ github.event.inputs.instance_number }}" -ForegroundColor Yellow
        Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, TotalPhysicalMemory
        Get-WmiObject -Class Win32_Processor | Select-Object Name, NumberOfCores

    - name: Enable RDP & Create User
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        $pass = ConvertTo-SecureString "P@ssw0rd!" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $pass
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin"
        Write-Host "User runneradmin created!" -ForegroundColor Green

    - name: Setup ngrok
      run: |
        Write-Host "Downloading ngrok..." -ForegroundColor Green
        Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
        Expand-Archive ngrok.zip -DestinationPath C:\ngrok
        
        Write-Host "Configuring ngrok..." -ForegroundColor Green
        C:\ngrok\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
        Write-Host "Starting ngrok tunnel..." -ForegroundColor Green
        cmd /c "start /B C:\ngrok\ngrok.exe tcp 3389"
        Start-Sleep -Seconds 20

    - name: Get Connection Details
      run: |
        try {
          $tunnel = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -TimeoutSec 10
          $host = $tunnel.tunnels[0].public_url -replace "tcp://", ""
          
          Write-Host "=========================================" -ForegroundColor Green
          Write-Host "        RDP CONNECTION DETAILS" -ForegroundColor Cyan
          Write-Host "=========================================" -ForegroundColor Green
          Write-Host "Host     : $host" -ForegroundColor Yellow
          Write-Host "User     : runneradmin" -ForegroundColor Yellow
          Write-Host "Password : P@ssw0rd!" -ForegroundColor Yellow
          Write-Host "=========================================" -ForegroundColor Green
          Write-Host "Server aktif 6 jam. Jangan tutup tab ini!" -ForegroundColor Red
        } catch {
          Write-Host "ERROR: Gagal dapat tunnel. Coba ulang workflow." -ForegroundColor Red
          exit 1
        }

    - name: Keep Alive
      run: |
        Write-Host "`n=== SESSION ACTIVE ===" -ForegroundColor Green
        Write-Host "RDP aktif 6 jam. Jangan tutup tab ini!" -ForegroundColor Red
        while ($true) {
          Start-Sleep -Seconds 600
        }
